server:
  port: 8080

spring:
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/changelog-master.xml
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/minibank}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:admin}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQL10Dialect
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    producer:
      group-id: notification-group
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.trusted.packages: "com.example.mini_bank.dto"
        spring.json.value.default.type: "com.example.mini_bank.dto.NotificationEventDto"
    properties:
      security.protocol: PLAINTEXT
jwt:
  secret: ${JWT_SECRET}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  algorithm: ${JWT_ALGORITHM:HS512}
logging:
  file:
    name: ${LOG_PATH:./logs}/app.log
    max-size: 10MB
    max-history: 30
  level:
    com.example.mini_bank: INFO
  liquibase: DEBUG